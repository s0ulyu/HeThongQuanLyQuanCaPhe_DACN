<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thực đơn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="layout.css">
    <style>
        body { margin-left: 0 !important; } /* Ghi đè layout.css */
        .main-content { margin-left: 0 !important; max-width: 100%; }
        .product-card { cursor: pointer; }
        .cart-fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1050;
        }
        .cart-badge {
            position: absolute;
            top: -5px;
            right: -10px;
        }
    </style>
</head>
<body>
    <div class="main-content p-3">
        <div class="container">
            <div class="text-center mb-4">
                <h1 class="display-5">Thực đơn của quán</h1>
                <p class="lead">Bạn đang đặt món cho <strong id="table-name" class="text-primary">...</strong></p>
            </div>

            <div class="mb-3">
                <input type="text" id="search-input" class="form-control form-control-lg" placeholder="Tìm kiếm tên món...">
            </div>
            <ul class="nav nav-pills mb-3" id="category-tabs" role="tablist"></ul>
            <div class="tab-content" id="product-panes"></div>
        </div>
    </div>

    <!-- Nút giỏ hàng nổi -->
    <button class="btn btn-primary btn-lg rounded-circle shadow-lg cart-fab" type="button" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas">
        <i class="bi bi-cart3"></i>
        <span class="badge rounded-pill bg-danger cart-badge" id="cart-item-count">0</span>
    </button>

    <!-- Offcanvas Giỏ hàng -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="cartOffcanvas">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">Giỏ hàng của bạn</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <ul id="cart-items-list" class="list-group list-group-flush">
                <li class="list-group-item text-center text-muted">Giỏ hàng trống</li>
            </ul>
        </div>
        <div class="offcanvas-footer p-3 border-top">
            <h4 class="text-end">Tổng tiền: <span id="cart-total-amount" class="text-danger">0đ</span></h4>
            <div class="d-grid">
                <button id="send-order-btn" class="btn btn-success btn-lg">Gửi Order đến quầy</button>
            </div>
        </div>
    </div>

    <!-- Modal chọn size -->
    <div class="modal fade" id="size-modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal-product-name">Chọn Size</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Vui lòng chọn size:</p>
                    <div id="modal-size-options" class="d-grid gap-2 mb-3"></div>
                    <div class="mb-3">
                        <label for="modal-note" class="form-label">Ghi chú (Tùy chọn)</label>
                        <input type="text" class="form-control" id="modal-note" placeholder="Ví dụ: ít đá, nhiều sữa...">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="menu.js"></script>
</body>
</html>
