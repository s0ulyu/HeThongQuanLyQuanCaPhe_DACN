<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý vai trò</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="layout.css">
    <style>
        /* Cải thiện giao diện */
        body { background-color: #f5f7fa; }
        .sidebar { width: 280px; box-shadow: 4px 0 15px rgba(0,0,0,0.05); z-index: 100; }
        .main-content { margin-left: 280px; padding: 40px; }
        .main-content > h1, .main-content > hr, .main-content > .row { margin-bottom: 30px; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <!-- Sidebar sẽ được render bởi auth.js -->
    </div>
    <div class="main-content">
        <h1>Quản Lý Vai Trò</h1>
        <hr>
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-header"><h4 id="role-form-title">Thêm vai trò mới</h4></div>
                    <div class="card-body">
                        <form id="role-form">
                            <input type="hidden" id="role-id">
                            <div class="mb-3">
                                <label for="role-name" class="form-label">Tên vai trò</label>
                                <input type="text" class="form-control" id="role-name" required>
                            </div>
                            <div class="mb-3">
                                <label for="role-description" class="form-label">Mô tả</label>
                                <textarea class="form-control" id="role-description" rows="3"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary" id="role-form-submit-btn">Lưu</button>
                            <button type="button" class="btn btn-secondary" id="role-form-cancel-btn" style="display: none;">Hủy</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header"><h4>Danh sách vai trò</h4></div>
                    <div class="card-body">
                        <ul id="role-list" class="list-group"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
    <script src="manage_roles.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
