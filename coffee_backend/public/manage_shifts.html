<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý ca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="layout.css">
    <style>
        /* Cải thiện giao diện */
        body { background-color: #f5f7fa; }
        .sidebar { width: 280px; box-shadow: 4px 0 15px rgba(0,0,0,0.05); z-index: 100; }
        .main-content { margin-left: 280px; padding: 40px; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-radius: 10px; }
        .main-content .container-fluid > * { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <!-- Sidebar sẽ được render bởi auth.js -->
    </div>

    <div class="main-content">
        <div class="container-fluid">
            <h1>Quản lý ca làm việc</h1>
            <p class="lead">Thêm, sửa, xóa các ca làm việc cho cửa hàng.</p>
            <hr />

            <div class="row">
                <div class="col-md-4">
                    <div class="card shadow-sm">
                        <div class="card-header">
                            <h4 id="shift-form-title">Thêm ca</h4>
                        </div>
                        <div class="card-body">
                            <form id="shift-form">
                                <input type="hidden" id="shift-id">
                                <div class="mb-3">
                                    <label for="shift-name" class="form-label">Tên ca (ví dụ: Ca sáng)</label>
                                    <input type="text" class="form-control" id="shift-name" required>
                                </div>
                                <div class="mb-3">
                                    <label for="start-time" class="form-label">Giờ vào làm</label>
                                    <input type="time" class="form-control" id="start-time" required>
                                </div>
                                <div class="mb-3">
                                    <label for="end-time" class="form-label">Giờ tan làm</label>
                                    <input type="time" class="form-control" id="end-time" required>
                                </div>
                                <div class="mb-3">
                                    <label for="late-threshold" class="form-label">Số phút đi trễ cho phép</label>
                                    <input type="number" class="form-control" id="late-threshold" value="5" min="0" required>
                                </div>
                                <button type="submit" class="btn btn-primary" id="shift-form-submit-btn">Lưu</button>
                                <button type="button" class="btn btn-secondary" id="shift-form-cancel-btn" style="display: none;">Hủy</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="card shadow-sm">
                        <div class="card-header">
                            <h4>Danh sách ca làm việc</h4>
                        </div>
                        <div class="card-body">
                            <ul id="shift-list" class="list-group">
                                <!-- Dữ liệu ca làm sẽ được tải vào đây -->
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="auth.js"></script>
    <script src="manage_shifts.js"></script>
</body>
</html>
