<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bán Hàng - Coffee Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="layout.css">
    
    <script>
        const user = localStorage.getItem('user');
        const token = localStorage.getItem('token');
        if (!user || !token) {
            window.location.href = 'login.html'; // Chuyển về login nếu chưa có token
        }
    </script>
    
</head>
<body>

    <div class="sidebar">
        <!-- Sidebar sẽ được render bởi auth.js -->
    </div>
    <!-- Nút bật/tắt sidebar cho màn hình nhỏ -->
    <button class="btn btn-dark d-lg-none" id="sidebar-toggle-btn">
        ☰
    </button>

    <div class="main-content">
        <div class="row">
            <div class="col-md-7">
                
                <h1 class="mb-3">Thực đơn</h1>
                <div class="mb-3">
                    <input type="text" id="search-input" class="form-control form-control-lg" placeholder="Tìm kiếm tên món...">
                </div>
                <ul class="nav nav-pills mb-3" id="category-tabs" role="tablist">
                    </ul>
                <div class="tab-content" id="product-panes">
                    </div>
                
                <hr class="my-4">
                
                <h2 class="mb-3">Danh sách bàn</h2>
                <ul id="table-list" class="list-group"></ul>
            </div>

            <div class="col-md-5">
                <!-- Offcanvas wrapper: Trên mobile là menu trượt, trên Desktop là div thường -->
                <div class="offcanvas-md offcanvas-end" tabindex="-1" id="cartOffcanvas" aria-labelledby="cartOffcanvasLabel">
                    <div class="offcanvas-header">
                        <h5 class="offcanvas-title" id="cartOffcanvasLabel">Đơn hàng</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" data-bs-target="#cartOffcanvas" aria-label="Close"></button>
                    </div>
                    <div class="offcanvas-body p-0">
                        <div id="order-panel" class="card shadow-sm w-100" style="position: sticky; top: 20px;">
                            <div class="card-body">
                                <h2 class="card-title">Đơn hàng: <span id="selected-table-name"></span></h2>
                                <ul id="current-order-list" class="list-group list-group-flush" style="max-height: 40vh; overflow-y: auto;"></ul>
                                <hr>
                                <h3 class="text-end">Tổng tiền: <span id="total-amount">0</span> đ</h3>
                                <div class="d-grid gap-2">
                                    <button id="submit-order-btn" class="btn btn-primary btn-lg">Tạo đơn hàng</button>
                                    <button id="pay-order-btn" class="btn btn-success btn-lg">Thanh toán</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="size-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal-product-name">Chọn size</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Vui lòng chọn size:</p>
                    <div id="modal-size-options" class="d-grid gap-2 mb-3">
                        </div>
                    <div class="mb-3">
                        <label for="modal-note" class="form-label">Ghi chú (tùy chọn)</label>
                        <input type="text" class="form-control" id="modal-note" placeholder="Ví dụ: ít đá, nhiều sữa...">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary" id="modal-add-to-cart-btn">Thêm vào đơn hàng</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Hóa Đơn (Dùng để in) -->
    <div class="modal fade" id="receipt-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Hóa đơn thanh toán</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="receipt-body">
                    <!-- Nội dung hóa đơn sẽ được JS điền vào đây -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button type="button" class="btn btn-success" onclick="window.print()"><i class="bi bi-printer"></i> In ngay</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Nút Giỏ hàng nổi (Chỉ hiện trên Mobile) -->
    <button class="btn btn-primary shadow-lg d-md-none d-flex align-items-center justify-content-center gap-2" 
            type="button" 
            data-bs-toggle="offcanvas" 
            data-bs-target="#cartOffcanvas" 
            style="position: fixed; bottom: 20px; right: 20px; z-index: 1050; border-radius: 50px; padding: 12px 20px;">
        <i class="bi bi-cart3 fs-5"></i>
        <span id="mobile-cart-total" class="fw-bold">0</span>
    </button>

    <script src="auth.js"></script>
    <script src="order.js"></script> 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Script nhỏ để đồng bộ tổng tiền xuống nút giỏ hàng trên mobile
        const totalAmountSpan = document.getElementById('total-amount');
        const mobileTotalSpan = document.getElementById('mobile-cart-total');
        
        if(totalAmountSpan && mobileTotalSpan) {
            const observer = new MutationObserver(() => {
                mobileTotalSpan.textContent = totalAmountSpan.textContent;
            });
            observer.observe(totalAmountSpan, { childList: true, characterData: true, subtree: true });
        }
    </script>
</body>
</html>
