<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo cáo doanh thu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="layout.css">
</head>
<body>
    <div class="sidebar">
        <!-- Sidebar sẽ được render bởi auth.js -->
    </div>

    <div class="main-content">
        <div class="container-fluid">
            <h1>Báo cáo doanh thu</h1>
            <p class="lead">Xem lại lịch sử các hóa đơn đã thanh toán</p>
            <hr />

            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <form id="report-form" class="row g-3 align-items-end">
                        <div class="col-md-5">
                            <label for="start-date" class="form-label">Từ ngày</label>
                            <input type="date" class="form-control" id="start-date" required>
                        </div>
                        <div class="col-md-5">
                            <label for="end-date" class="form-label">Đến ngày</label>
                            <input type="date" class="form-control" id="end-date" required>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary w-100">Xem báo cáo</button>
                        </div>
                    </form>
                </div>
            </div>
            
            <div class="card shadow-sm">
                <div class="card-body">
                    <h4 class="card-title">Kết quả (nhấp vào dòng để xem chi tiết)</h4>
                    <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>Mã HĐ</th>
                                <th>Thời gian</th>
                                <th>Bàn</th>
                                <th>Nhân viên</th>
                                <th>Tổng tiền (đ)</th>
                            </tr>
                        </thead>
                        <tbody id="report-table-body">
                            <!-- Dữ liệu sẽ được tải vào đây -->
                        </tbody>
                    </table>
                    </div>
                    <hr>
                    <div class="text-end">
                        <h4>Tổng doanh thu: <span id="total-revenue" class="text-danger">0 đ</span></h4>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal xem chi tiết hóa đơn -->
    <div class="modal fade" id="details-modal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="details-modal-title">Chi tiết hóa đơn</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="details-modal-body"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button type="button" class="btn btn-success" onclick="window.print()"><i class="bi bi-printer"></i> In hóa đơn</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="auth.js"></script>
    <script src="sales_report.js"></script>
</body>
</html>
