<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo phiếu nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="layout.css">
    <style>
        /* Cải thiện giao diện */
        body { background-color: #f5f7fa; }
        .sidebar { width: 280px; box-shadow: 4px 0 15px rgba(0,0,0,0.05); z-index: 100; }
        .main-content { margin-left: 280px; padding: 40px; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <!-- Sidebar sẽ được render bởi auth.js -->
    </div>

    <div class="main-content">
        <div class="row">
            <div class="col-lg-10 offset-lg-1">
                <h1 class="mb-3">Tạo phiếu nhập hàng</h1>
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <form id="import-form">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="import-supplier" class="form-label">Nhà cung cấp (tùy chọn)</label>
                                    <select id="import-supplier" class="form-select">
                                        <option value="">-- Chọn nhà cung cấp --</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="import-date" class="form-label">Ngày nhập</label>
                                    <input type="date" class="form-control" id="import-date" required>
                                </div>
                                <div class="col-12">
                                    <label for="import-note" class="form-label">Ghi chú (tùy chọn)</label>
                                    <textarea class="form-control" id="import-note" rows="2"></textarea>
                                </div>
                            </div>
                            <hr class="my-4">
                            <h5>Thêm nguyên vật liệu vào phiếu</h5>
                            <div class="row g-3 align-items-end" id="add-item-form">
                                <div class="col-md-5">
                                    <label for="import-material" class="form-label">Nguyên vật liệu</label>
                                    <select id="import-material" class="form-select">
                                        <option value="">-- Chọn NVL --</option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <label for="import-quantity" class="form-label">Số lượng</label>
                                    <input type="number" step="0.01" class="form-control" id="import-quantity">
                                </div>
                                <div class="col-md-3">
                                    <label for="import-cost" class="form-label">Đơn giá (cho 1 đơn vị)</label>
                                    <input type="number" class="form-control" id="import-cost">
                                </div>
                                <div class="col-md-1">
                                    <button type="button" class="btn btn-primary w-100" id="add-item-btn">+</button>
                                </div>
                            </div>
                            <hr class="my-4">
                            <h4>Danh sách hàng nhập</h4>
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Tên NVL</th>
                                        <th>SL</th>
                                        <th>Đơn giá</th>
                                        <th>Thành tiền</th>
                                        <th>Xóa</th>
                                    </tr>
                                </thead>
                                <tbody id="import-items-list">
                                    </tbody>
                            </table>
                            <h3 class="text-end">Tổng cộng: <span id="import-total-cost" class="text-danger">0 đ</span></h3>
                            <button type="submit" class="btn btn-success btn-lg w-100">Lưu phiếu nhập kho</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
    <script src="manage_imports.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
