<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo cáo chấm công</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="layout.css">
    <style>
        /* Cải thiện giao diện */
        body { background-color: #f5f7fa; }
        .sidebar { width: 280px; box-shadow: 4px 0 15px rgba(0,0,0,0.05); z-index: 100; }
        .main-content { margin-left: 280px; padding: 40px; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-radius: 10px; margin-bottom: 30px; }
        h1, .lead, hr { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <!-- Sidebar sẽ được render bởi auth.js -->
    </div>

    <div class="main-content">
        <div class="container-fluid">
            <h1>Báo cáo chấm công</h1>
            <p class="lead">Xem lại lịch sử đi làm của nhân viên</p>
            <hr />

            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <form id="report-filter-form" class="row g-3 align-items-end">
                        <div class="col-md-4">
                            <label for="start-date" class="form-label">Từ ngày</label>
                            <input type="date" class="form-control" id="start-date" required>
                        </div>
                        <div class="col-md-4">
                            <label for="end-date" class="form-label">Đến ngày</label>
                            <input type="date" class="form-control" id="end-date" required>
                        </div>
                        <div class="col-md-3">
                            <label for="employee-select" class="form-label">Nhân viên</label>
                            <select id="employee-select" class="form-select">
                                <option value="">-- Tất cả nhân viên --</option>
                            </select>
                        </div>
                        <div class="col-md-1"><button type="submit" class="btn btn-primary w-100">Xem</button></div>
                    </form>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Nhân viên</th>
                            <th>Giờ vào</th>
                            <th>Giờ ra</th>
                            <th>Trạng thái vào</th>
                            <th>Trạng thái ra</th>
                            <th>Vị trí vào</th>
                            <th>Vị trí ra</th>
                        </tr>
                    </thead>
                    <tbody id="report-body">
                        <!-- Dữ liệu sẽ được tải vào đây -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="auth.js"></script>
    <script src="timekeeping_report.js"></script>
</body>
</html>
