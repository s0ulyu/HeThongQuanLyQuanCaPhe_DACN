<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch làm việc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="layout.css">
    <style>
        /* Cải thiện giao diện */
        body { background-color: #f5f7fa; }
        .sidebar { width: 280px; box-shadow: 4px 0 15px rgba(0,0,0,0.05); z-index: 100; }
        .main-content { margin-left: 280px; padding: 40px; }
        h1, .lead, .d-flex { margin-bottom: 20px; }

        .schedule-table th, .schedule-table td {
            vertical-align: middle;
            text-align: center;
        }
        .schedule-table th:first-child,
        .schedule-table td:first-child {
            text-align: left;
            min-width: 150px;
        }
        .shift-select {
            min-width: 120px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <!-- Sidebar sẽ được render bởi auth.js -->
    </div>

    <div class="main-content">
        <div class="container-fluid">
            <h1>Lịch làm việc</h1>
            <p class="lead">Chọn tuần và gán ca cho từng nhân viên.</p>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <button id="prev-week-btn" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Tuần trước</button>
                <h4 id="week-display"></h4>
                <button id="next-week-btn" class="btn btn-outline-secondary">Tuần sau <i class="bi bi-arrow-right"></i></button>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered schedule-table">
                    <thead id="schedule-head"></thead>
                    <tbody id="schedule-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Thêm thư viện Day.js để xử lý ngày tháng -->
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/isoWeek.js"></script>
    <script src="auth.js"></script>
    <script src="manage_schedules.js"></script>
</body>
</html>
