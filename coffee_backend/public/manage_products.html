<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý món</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="layout.css">
    <style>
        /* Cải thiện giao diện: Tăng khoảng cách và làm thoáng layout */
        body {
            background-color: #f5f7fa;
        }
        .sidebar {
            width: 280px;
            box-shadow: 4px 0 15px rgba(0,0,0,0.05);
            z-index: 100;
        }
        .main-content {
            margin-left: 280px;
            padding: 40px;
        }
        .main-content > h1, 
        .main-content > hr, 
        .main-content > .row, 
        .main-content > .card {
            margin-bottom: 30px;
        }
        .card {
            border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <!-- Sidebar sẽ được render bởi auth.js -->
    </div>

    <div class="main-content">
        <h1>Quản lý món & Định lượng</h1>
        <hr>
        
        <div class="row">
            <div class="col-lg-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-header">
                        <h4>1. Chọn món</h4>
                    </div>
                    <div class="card-body">
                        <form id="product-form" class="mb-3">
                            <input type="hidden" id="product-id">
                            <div class="mb-3">
                                <label for="product-name" class="form-label">Tên món</label>
                                <input type="text" class="form-control" id="product-name" required>
                            </div>
                            <div class="mb-3">
                                <label for="product-category-select" class="form-label">Loại</label>
                                <select class="form-select" id="product-category-select" required>
                                    <option value="">-- Tải danh mục... --</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary" id="form-submit-btn">Thêm món mới</button>
                            <button type="button" class="btn btn-secondary" id="form-cancel-btn" style="display: none;">Hủy</button>
                        </form>
                        <hr>
                        <div class="mb-3">
                            <input type="text" id="search-product-input" class="form-control" placeholder="Tìm kiếm tên món...">
                        </div>
                        <ul class="nav nav-pills nav-fill mb-3" id="category-tabs-manage" role="tablist">
                            </ul>
                        <hr>
                        <ul id="product-list-manage" class="list-group" style="max-height: 500px; overflow-y: auto;">
                            </ul>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                 <div class="card shadow-sm mb-4" id="variants-panel" style="display: none;">
                    <div class="card-header">
                        <h4>2. Quản lý size & giá cho: <span id="selected-product-name" class="text-primary"></span></h4>
                    </div>
                    <div class="card-body">
                        <form id="variant-form" class="row g-3">
                            <input type="hidden" id="variant-id">
                            <div class="col-md-5">
                                <label for="variant-size" class="form-label">Tên Size (S, M, L...)</label>
                                <input type="text" class="form-control" id="variant-size" required>
                            </div>
                            <div class="col-md-5">
                                <label for="variant-price" class="form-label">Giá (VNĐ)</label>
                                <input type="number" class="form-control" id="variant-price" required>
                            </div>
                            <div class="col-md-2 d-flex align-items-end">
                                <button type="submit" class="btn btn-success" id="variant-form-submit-btn">Thêm</button>
                            </div>
                            <button type="button" class="btn btn-secondary btn-sm" id="variant-form-cancel-btn" style="display: none;">Hủy Sửa Size</button>
                        </form>
                        <hr>
                        <h5>Các size hiện có (Bấm để định lượng):</h5>
                        <ul id="variant-list" class="list-group">
                            </ul>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                 <div class="card shadow-sm mb-4" id="recipe-panel" style="display: none;">
                    <div class="card-header">
                        <h4>3. Định lượng cho: <span id="selected-variant-name" class="text-primary"></span></h4>
                    </div>
                    <div class="card-body">
                        <form id="recipe-form" class="row g-3 align-items-end">
                            <div class="col-md-7">
                                <label for="recipe-material" class="form-label">Nguyên vật liệu</label>
                                <select id="recipe-material" class="form-select" required>
                                    <option value="">-- Chọn NVL --</option>
                                    </select>
                            </div>
                            <div class="col-md-3">
                                <label for="recipe-quantity" class="form-label">Số lượng</label>
                                <input type="number" step="0.01" class="form-control" id="recipe-quantity" required>
                            </div>
                            <div class="col-md-2">
                                <button type="submit" class="btn btn-success">+</button>
                            </div>
                            <small class="form-text text-muted">Lưu ý: Đơn vị tính (kg, lít, cái) phải khớp với NVL đã chọn.</small>
                        </form>
                        <hr>
                        <h5>Công thức hiện tại:</h5>
                        <ul id="recipe-list" class="list-group">
                            </ul>
                    </div>
                </div>
            </div>

        </div>
    </div>
    <script src="auth.js"></script> <!-- KIỂM TRA QUYỀN TRUY CẬP -->
    <script src="manage_products.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
