<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý bàn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="layout.css">
    <style>
        /* Cải thiện giao diện */
        body { background-color: #f5f7fa; }
        .sidebar { width: 280px; box-shadow: 4px 0 15px rgba(0,0,0,0.05); z-index: 100; }
        .main-content { margin-left: 280px; padding: 40px; }
        .main-content > h1, .main-content > hr, .main-content > .row { margin-bottom: 30px; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <!-- Sidebar sẽ được render bởi auth.js -->
    </div>
    <div class="main-content">
        <h1>Quản lý bàn</h1>
        <hr>
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <div class="card shadow-sm mb-4">
                    <div class="card-header">
                        <h4 id="table-form-title">Thêm bàn mới</h4>
                    </div>
                    <div class="card-body">
                        <form id="table-form" class="d-flex mb-3">
                            <input type="hidden" id="table-id">
                            <input type="text" class="form-control me-2" id="table-name" placeholder="Tên bàn (ví dụ: 'Bàn 10', 'Ngoài trời 1')..." required>
                            <button type="submit" class="btn btn-primary" id="table-form-submit-btn">Thêm</button>
                            <button type="button" class="btn btn-secondary ms-2" id="table-form-cancel-btn" style="display: none;">Hủy</button>
                        </form>
                    </div>
                </div>
                <div class="card shadow-sm mb-4">
                    <div class="card-header">
                        <h4>Danh sách bàn hiện có</h4>
                    </div>
                    <div class="card-body">
                        <ul id="table-list" class="list-group"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
    <script src="manage_tables.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
