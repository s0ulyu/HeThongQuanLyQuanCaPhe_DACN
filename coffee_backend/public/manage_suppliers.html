<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Nhà Cung Cấp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="layout.css">
    <style>
        /* Cải thiện giao diện: Tăng khoảng cách và làm thoáng layout */
        body {
            background-color: #f5f7fa;
        }
        .sidebar {
            width: 280px; /* Tăng độ rộng sidebar */
            box-shadow: 4px 0 15px rgba(0,0,0,0.05);
            z-index: 100;
        }
        .main-content {
            margin-left: 280px; /* Đẩy content sang phải khớp với sidebar */
            padding: 40px; /* Tăng padding nội dung */
        }
        /* Khoảng cách đều giữa các khối chính */
        .main-content > h1, 
        .main-content > hr, 
        .main-content > .row, 
        .main-content > .card {
            margin-bottom: 30px;
        }
        /* Style cho Card đẹp và thoáng hơn */
        .card {
            border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <!-- Sidebar sẽ được render bởi auth.js -->
    </div>

    <div class="main-content">
        <h1>Quản lý nhà cung cấp</h1>
        <hr>
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-header"><h4 id="supplier-form-title">Thêm nhà cung cấp</h4></div>
                    <div class="card-body">
                        <form id="supplier-form">
                            <input type="hidden" id="supplier-id">
                            <div class="mb-3">
                                <label for="supplier-name" class="form-label">Tên Nhà Cung Cấp</label>
                                <input type="text" class="form-control" id="supplier-name" required>
                            </div>
                            <div class="mb-3">
                                <label for="supplier-phone" class="form-label">Số điện thoại</label>
                                <input type="tel" class="form-control" id="supplier-phone">
                            </div>
                            <div class="mb-3">
                                <label for="supplier-email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="supplier-email">
                            </div>
                            <div class="mb-3">
                                <label for="supplier-address" class="form-label">Địa chỉ</label>
                                <textarea class="form-control" id="supplier-address" rows="3"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary" id="supplier-form-submit-btn">Lưu</button>
                            <button type="button" class="btn btn-secondary" id="supplier-form-cancel-btn" style="display: none;">Hủy</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-header"><h4>Danh sách nhà cung cấp</h4></div>
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Tên</th>
                                    <th>Điện thoại</th>
                                    <th>Email</th>
                                    <th>Hành động</th>
                                </tr>
                            </thead>
                            <tbody id="supplier-list">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="auth.js"></script> 
    <script src="manage_suppliers.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
