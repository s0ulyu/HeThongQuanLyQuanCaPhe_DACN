<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử nhập hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="layout.css">
    <style>
        /* Cải thiện giao diện */
        body { background-color: #f5f7fa; }
        .sidebar { width: 280px; box-shadow: 4px 0 15px rgba(0,0,0,0.05); z-index: 100; }
        .main-content { margin-left: 280px; padding: 40px; }
        .main-content > h1, .main-content > hr, .main-content > .card { margin-bottom: 30px; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <!-- Sidebar sẽ được render bởi auth.js -->
    </div>

    <div class="main-content">
        <h1>Lịch sử nhập hàng</h1>
        <hr>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <form id="history-form" class="row g-3 align-items-end">
                    <div class="col-md-5">
                        <label for="start-date" class="form-label">Từ ngày</label>
                        <input type="date" class="form-control" id="start-date" required>
                    </div>
                    <div class="col-md-5">
                        <label for="end-date" class="form-label">Đến ngày</label>
                        <input type="date" class="form-control" id="end-date" required>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">Xem lịch sử</button>
                    </div>
                </form>
            </div>
        </div>
        
        <div class="card shadow-sm">
            <div class="card-body">
                <h4 class="card-title">Kết quả (nhấp vào dòng để xem chi tiết)</h4>
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Mã PN</th>
                            <th>Ngày Nhập</th>
                            <th>NCC</th>
                            <th>Tổng tiền</th>
                        </tr>
                    </thead>
                    <tbody id="import-history-list">
                        <tr>
                            <td colspan="4" class="text-center">Vui lòng chọn ngày để xem lịch sử.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div class="modal fade" id="import-details-modal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="import-details-title">Chi tiết phiếu nhập</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="import-details-body">
                    </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                </div>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
    <script src="manage_imports_history.js"></script> <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
