<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý nguyên vật liệu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="layout.css">
    <style>
        /* Cải thiện giao diện */
        body { background-color: #f5f7fa; }
        .sidebar { width: 280px; box-shadow: 4px 0 15px rgba(0,0,0,0.05); z-index: 100; }
        .main-content { margin-left: 280px; padding: 40px; }
        .main-content > h1, .main-content > hr, .main-content > .row { margin-bottom: 30px; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <!-- Sidebar sẽ được render bởi auth.js -->
    </div>

    <div class="main-content">
        <h1>Quản lý nguyên vật liệu</h1>
        <hr>
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-header"><h4 id="material-form-title">Thêm nguyên vật liệu</h4></div>
                    <div class="card-body">
                        <form id="material-form">
                            <input type="hidden" id="material-id">
                            <div class="mb-3">
                                <label for="material-name" class="form-label">Tên NVL (Cà phê, Sữa...)</label>
                                <input type="text" class="form-control" id="material-name" required>
                            </div>
                            <div class="mb-3">
                                <label for="material-unit" class="form-label">Đơn vị tính (kg, lít, cái...)</label>
                                <input type="text" class="form-control" id="material-unit" required>
                            </div>
                            <div class="mb-3">
                                <label for="material-safety-stock" class="form-label">Mức tồn kho an toàn</label>
                                <input type="number" class="form-control" id="material-safety-stock" value="0" required>
                                <small class="form-text text-muted">Hệ thống sẽ cảnh báo khi tồn kho dưới mức này.</small>
                            </div>
                            <button type="submit" class="btn btn-primary" id="material-form-submit-btn">Lưu</button>
                            <button type="button" class="btn btn-secondary" id="material-form-cancel-btn" style="display: none;">Hủy</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-header"><h4>Danh sách NVL trong kho</h4></div>
                    <div class="card-body">
                        
                        <div class="mb-3">
                            <input type="text" id="search-material-input" class="form-control" placeholder="Tìm kiếm tên NVL...">
                        </div>
                        
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Tên NVL</th>
                                    <th>Đơn vị</th>
                                    <th>Tồn kho</th>
                                    <th>Mức an toàn</th>
                                    <th>Hành động</th>
                                </tr>
                            </thead>
                            <tbody id="material-list">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
    <script src="manage_materials.js"></script> 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
