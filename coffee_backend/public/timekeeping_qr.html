<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mã QR chấm công</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="layout.css">
    <style>
        #qrcode {
            width: 300px;
            height: 300px;
            margin: 2rem auto;
            border: 5px solid #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <!-- Sidebar sẽ được render bởi auth.js -->
    </div>

    <div class="main-content text-center">
        <h1>Mã QR chấm công</h1>
        <p class="lead">Nhân viên vui lòng sử dụng điện thoại để quét mã này.</p>
        <p>Mã sẽ tự động làm mới sau mỗi <strong id="countdown">20</strong> giây.</p>
        <div id="qrcode"></div>
        <div id="status" class="alert alert-info">Đang tạo mã QR...</div>
    </div>

    <!-- Thư viện qrcode.js -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="auth.js"></script>
    <script src="timekeeping_qr.js"></script>
</body>
</html>
