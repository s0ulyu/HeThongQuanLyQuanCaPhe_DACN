<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quét mã chấm công</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="layout.css">
    <style>
        #reader {
            width: 100%;
            max-width: 500px;
            margin: 1rem auto;
            border: 5px solid #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <!-- Sidebar sẽ được render bởi auth.js -->
    </div>

    <div class="main-content text-center">
        <h1>Quét mã QR chấm công</h1>
        <p class="lead">Di chuyển camera của bạn để quét mã QR trên màn hình của quản lý.</p>
        <div id="secure-context-error" class="alert alert-danger" style="display: none;">
            <strong>Lỗi bảo mật:</strong> Không thể truy cập camera. Chức năng này yêu cầu trang web phải được tải qua kết nối an toàn (HTTPS).
        </div>
        <div id="reader"></div>
    </div>

    <!-- Thư viện html5-qrcode -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="auth.js"></script>
    <script src="timekeeping_scan.js"></script>

    <!-- Modal (Pop-up) hiển thị kết quả quét -->
    <div class="modal fade" id="resultModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center border-0 shadow-lg" id="result-modal-content">
                <div class="modal-body p-5">
                    <div id="result-icon" class="mb-4"></div>
                    <h3 id="result-message"></h3>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
