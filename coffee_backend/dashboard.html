<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ - Coffee Track</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        /* Cải thiện giao diện */
        body { background-color: #f5f7fa; }
        .sidebar { width: 280px; box-shadow: 4px 0 15px rgba(0,0,0,0.05); z-index: 100; }
        .main-content { margin-left: 280px; padding: 40px; }
        .main-content > h1, .main-content > hr, .main-content > .row, .page-content > .row, .page-content > .card { margin-bottom: 30px; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <!-- Sidebar sẽ được render bởi auth.js -->
    </div>

    <div class="main-content">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="search-bar">
                <input type="text" class="form-control" placeholder="Tìm kiếm...">
            </div>
            <div class="admin-info">
                <div class="avatar" id="user-avatar">AD</div>
                <span id="user-fullname">Admin</span>
            </div>
        </div>

        <!-- Page Content -->
        <div class="page-content">
            <!-- Welcome Card -->
            <div class="card welcome-card mb-4">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <h4 class="card-title">Chào mừng trở lại, <span id="welcome-user-name">Admin</span>!</h4>
                        <p class="card-text">Chúc bạn một ngày làm việc hiệu quả.</p>
                    </div>
                    <a href="sales_report.html" class="btn btn-light">Xem chi tiết doanh thu</a>
                </div>
            </div>

            <!-- Quick Stats -->
            <div class="row">
                <div class="col-md-3 mb-4">
                    <div class="stat-card bg-primary">
                        <div class="icon"><i class="bi bi-receipt"></i></div>
                        <div class="info">
                            <h5>Tổng đơn hàng</h5>
                            <p id="stat-total-orders">0</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-3 mb-4">
                    <div class="stat-card bg-success">
                        <div class="icon"><i class="bi bi-cup-straw"></i></div>
                        <div class="info">
                            <h5>Tổng món</h5>
                            <p id="stat-total-products">0</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-3 mb-4">
                    <div class="stat-card bg-warning text-dark">
                        <div class="icon"><i class="bi bi-people-fill"></i></div>
                        <div class="info">
                            <h5>Tổng khách hàng</h5>
                            <p id="stat-total-customers">0</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-3 mb-4">
                    <div class="stat-card bg-danger">
                        <div class="icon"><i class="bi bi-person-badge"></i></div>
                        <div class="info">
                            <h5>Tổng nhân viên</h5>
                            <p id="stat-total-employees">0</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Charts -->
            <div class="row">
                <div class="col-lg-8 mb-4">
                    <div class="card shadow-sm">
                        <div class="card-header">Doanh thu theo tháng (Năm <span id="revenue-chart-year"></span>)</div>
                        <div class="card-body">
                            <canvas id="monthly-revenue-chart"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4 mb-4">
                    <div class="card shadow-sm">
                        <div class="card-header">Tỷ trọng doanh thu theo danh mục</div>
                        <div class="card-body">
                            <canvas id="category-sales-chart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Thư viện Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="auth.js"></script>
    <script src="dashboard.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
